name: Docker Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Docker image
        run: docker build -f docker/reth.Dockerfile -t externevm-reth:ci .